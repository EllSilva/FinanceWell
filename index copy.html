<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Responsivo Vue 2</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .slider-container {
            position: relative;
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }
        
        .slider-window {
            width: 100%;
            overflow: hidden;
            padding: 20px 0;
        }
        
        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 20px;
        }
        /* RESPONSIVIDADE DOS CARDS */
        
        .slide-card {
            flex: 0 0 calc(33.333% - 14px);
            /* Desktop: 3 itens */
            height: 400px;
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            display: flex;
            align-items: flex-end;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @media (max-width: 1024px) {
            .slide-card {
                flex: 0 0 calc(50% - 10px);
            }
            /* Tablet: 2 itens */
        }
        
        @media (max-width: 600px) {
            .slide-card {
                flex: 0 0 100%;
            }
            /* Mobile: 1 item */
        }
        
        .card-info {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            width: 100%;
            padding: 20px;
            border-radius: 0 0 15px 15px;
        }
        /* BOTÕES VISÍVEIS */
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: #fff;
            scale: 1.1;
        }
        
        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        /* Posicionamento dos botões para fora do slider em telas grandes, dentro em pequenas */
        
        .prev {
            left: -25px;
        }
        
        .next {
            right: -25px;
        }
        
        @media (max-width: 768px) {
            .prev {
                left: 10px;
            }
            .next {
                right: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <div class="slider-container">
            <!-- Botões -->
            <button class="nav-btn prev" @click="prev" :disabled="currentIdx === 0">❮</button>
            <button class="nav-btn next" @click="next" :disabled="currentIdx >= maxIdx">❯</button>

            <div class="slider-window">
                <!-- O cálculo do transform agora é baseado no itemWidth dinâmico -->
                <div class="slider-track" :style="{ transform: `translateX(-${currentIdx * stepSize}%)` }">
                    <div v-for="slide in slides" :key="slide.id" class="slide-card" :style="{ backgroundImage: 'url(' + slide.img + ')' }">
                        <div class="card-info">
                            <h3>{{ slide.title }}</h3>
                            <p>{{ slide.category }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                currentIdx: 0,
                itemsVisible: 3,
                slides: [{
                    id: 1,
                    title: 'Projeto Alpha',
                    category: 'Web Design',
                    img: 'https://picsum.photos/id/10/400/600'
                }, {
                    id: 2,
                    title: 'Studio Neon',
                    category: 'Branding',
                    img: 'https://picsum.photos/id/20/400/600'
                }, {
                    id: 3,
                    title: 'Future Tech',
                    category: 'App Dev',
                    img: 'https://picsum.photos/id/30/400/600'
                }, {
                    id: 4,
                    title: 'Minimalist',
                    category: 'Architecture',
                    img: 'https://picsum.photos/id/40/400/600'
                }, {
                    id: 5,
                    title: 'Abstract Art',
                    category: 'Graphic Design',
                    img: 'https://picsum.photos/id/50/400/600'
                }, {
                    id: 6,
                    title: 'Deep Ocean',
                    category: 'Photography',
                    img: 'https://picsum.photos/id/60/400/600'
                }]
            },
            computed: {
                // Calcula quantos itens faltam para chegar ao fim
                maxIdx() {
                    return this.slides.length - this.itemsVisible;
                },
                // Calcula a porcentagem do passo baseada na largura da tela
                stepSize() {
                    return 100 / this.itemsVisible;
                }
            },
            methods: {
                updateItemsVisible() {
                    const width = window.innerWidth;
                    if (width < 600) this.itemsVisible = 1;
                    else if (width < 1024) this.itemsVisible = 2;
                    else this.itemsVisible = 3;

                    // Reseta o índice se ele estourar o novo limite ao redimensionar
                    if (this.currentIdx > this.maxIdx) this.currentIdx = this.maxIdx;
                },
                next() {
                    if (this.currentIdx < this.maxIdx) this.currentIdx++;
                },
                prev() {
                    if (this.currentIdx > 0) this.currentIdx--;
                }
            },
            mounted() {
                this.updateItemsVisible();
                window.addEventListener('resize', this.updateItemsVisible);
            },
            beforeDestroy() {
                window.removeEventListener('resize', this.updateItemsVisible);
            }
        });
    </script>

</body>

</html>
