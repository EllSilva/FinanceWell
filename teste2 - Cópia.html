<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Dinâmico - Vue.js 2</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 500px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .resultado { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid #2196F3; border-radius: 4px; }
    </style>
</head>
<body>

<div id="app" class="container">
    <h2>Inscrição de Treinamentos</h2>
    
    <div class="form-group">
        <label for="categoria">Selecione a Categoria:</label>
        <select id="categoria" v-model="categoriaSelecionada" @change="cursoSelecionado = ''">
            <option value="">-- Escolha uma Categoria --</option>
            <option v-for="(cursos, categoria) in dados" :key="categoria" :value="categoria">
                {{ categoria }}
            </option>
        </select>
    </div>

    <div class="form-group">
        <label for="curso">Selecione o Curso:</label>
        <select id="curso" v-model="cursoSelecionado" :disabled="!categoriaSelecionada">
            <option value="">-- Escolha um Curso --</option>
            <option v-for="curso in cursosFiltrados" :key="curso" :value="curso">
                {{ curso }}
            </option>
        </select>
    </div>

    <div v-if="categoriaSelecionada && cursoSelecionado" class="resultado">
        <strong>Inscrição solicitada:</strong><br>
        Categoria: {{ categoriaSelecionada }} <br>
        Curso: {{ cursoSelecionado }}
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            categoriaSelecionada: '',
            cursoSelecionado: '',
            // Estrutura de dados baseada na tua tabela
            dados: {
                "CONTABILIDADE": [
                    "Contabilidade Aplicada", "Fecho de Contas", "Abertura de Contas", 
                    "Regularizações de Contas", "Reconciliações de Contas", "Apuramento do IVA"
                ],
                "FISCALIDADE": [
                    "Fiscalidade Angolana (AGT e INSS)", "Portal do contribuinte Iniciante", 
                    "Portal do Contribuinte Intermédio", "Imposto de Selo", "Imposto Sobre o Valor Acrescentado"
                ],
                "RECURSOS HUMANOS": [
                    "Recursos Humanos Aplicada", "Processamento Salarial", "Higiene e Segurança no Trabalho"
                ],
                "CONSULTORIA": [
                    "Consultoria Empresarial", "Constituição e Legalização de Empresas", "Plano de Negocio"
                ],
                "INFORMÁTICA": [
                    "Excel", "Word", "Power Point", "Optica do Utilizador"
                ]
            }
        },
        computed: {
            // Esta função roda sozinha sempre que 'categoriaSelecionada' mudar
            cursosFiltrados() {
                if (!this.categoriaSelecionada) {
                    return [];
                }
                // Retorna apenas o array de cursos da categoria que o usuário escolheu
                return this.dados[this.categoriaSelecionada];
            }
        }
    });
</script>

</body>
</html>
