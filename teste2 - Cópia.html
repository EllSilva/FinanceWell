<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Slider - Dinâmico</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background-color: #f3f4f8;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }
    .team-section { padding: 80px 0; }

    /* Container do Swiper para dar espaço aos botões laterais */
    .swiper-container-wrapper {
      position: relative;
      padding: 0 50px;
    }

    .swiper-container {
      width: 100%;
      padding: 40px 0 60px 0;
    }
    
    .team-card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: all 0.4s ease;
      transform: scale(0.9); /* Cards laterais levemente menores */
      opacity: 0.6;
    }

    .image-container {
      position: relative;
      width: 100%;
      padding-top: 100%;
      background-color: #eaeaea;
    }
    .image-container img {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: all 0.4s ease;
    }

    .social-bar {
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #eee;
      transition: all 0.4s ease;
    }
    .social-icon {
      background: #222;
      color: #fff;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .social-user { padding-left: 15px; font-size: 0.85rem; color: #777; transition: color 0.4s ease;}

    .member-info {
      padding: 25px;
      position: relative;
      transition: all 0.4s ease;
    }
    .member-name { font-size: 1.2rem; font-weight: 700; }
    .member-role { font-size: 0.9rem; color: #888; margin-bottom: 15px; }
    
    .arrow-btn {
      position: absolute;
      bottom: 25px;
      right: 25px;
      color: #0d6efd;
      transition: all 0.4s ease;
    }

    /* ======================================================
       ESTILO ATIVO (O CARD CENTRAL/SELECIONADO)
    ========================================================= */
    
    /* Quando o slide for o ativo, aumentamos escala e opacidade */
    .swiper-slide-active .team-card {
      transform: scale(1.05);
      opacity: 1;
      z-index: 10;
    }

    /* Cores do estado ativo */
    .swiper-slide-active .image-container img {
      filter: grayscale(0%);
    }
    .swiper-slide-active .social-bar {
      background: #0d6efd;
    }
    .swiper-slide-active .social-user {
      color: #fff;
    }
    .swiper-slide-active .member-info {
      background: #0d6efd;
      color: #fff;
    }
    .swiper-slide-active .member-role {
      color: rgba(255,255,255,0.8);
    }
    .swiper-slide-active .arrow-btn {
      color: #fff;
      transform: translateX(5px);
    }

    /* Estilização dos Botões Prev/Next */
    .nav-btn {
      width: 50px;
      height: 50px;
      background: #fff;
      border-radius: 50%;
      color: #0d6efd;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    .nav-btn:after {
      font-size: 1.2rem !important;
      font-weight: bold;
    }
    .nav-btn:hover {
      background: #0d6efd;
      color: #fff;
    }
    .swiper-button-prev { left: 0; }
    .swiper-button-next { right: 0; }

    /* Ajuste para mobile */
    @media (max-width: 768px) {
      .swiper-container-wrapper { padding: 0 10px; }
      .nav-btn { display: none; } /* Esconde setas no mobile para focar no touch */
    }
  </style>
</head>
<body>

  <div id="app" class="container team-section">
    <div class="row justify-content-center text-center mb-5">
      <div class="col-md-8">
        <h2 class="fw-bold display-5">Meet Our Team</h2>
        <p class="text-muted">A cada movimento do slider, o card central ganha o destaque azul automaticamente.</p>
      </div>
    </div>

    <div class="swiper-container-wrapper">
      <div class="swiper swiper-container">
        <div class="swiper-wrapper">
          
          <div class="swiper-slide" v-for="(membro, index) in equipe" :key="index">
            <div class="team-card">
              <div class="image-container">
                <img :src="membro.foto" :alt="membro.nome">
              </div>
              <div class="social-bar">
                <div class="social-icon">
                  <i :class="membro.socialIcon"></i>
                </div>
                <div class="social-user">{{ membro.socialUser }}</div>
              </div>
              <div class="member-info">
                <div class="member-name">{{ membro.nome }}</div>
                <div class="member-role">{{ membro.cargo }}</div>
                <a href="#" class="arrow-btn">
                  <i class="fa-solid fa-arrow-right"></i>
                </a>
              </div>
            </div>
          </div>

        </div>
        
        <div class="swiper-pagination"></div>
      </div>

      <div class="swiper-button-prev nav-btn"></div>
      <div class="swiper-button-next nav-btn"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    new Vue({
      el: '#app',
      data: {
        equipe: [
          { nome: 'John Doe', cargo: 'Art Director', socialUser: 'fb/johndoe', socialIcon: 'fa-brands fa-facebook-f', foto: 'https://i.pravatar.cc/500?img=11' },
          { nome: 'Alex Smith', cargo: 'UX Designer', socialUser: 'tw/alexsmith', socialIcon: 'fa-brands fa-twitter', foto: 'https://i.pravatar.cc/500?img=12' },
          { nome: 'Joss Anderson', cargo: 'Web Designer', socialUser: 'in/jossanderson', socialIcon: 'fa-brands fa-linkedin-in', foto: 'https://i.pravatar.cc/500?img=13' },
          { nome: 'Maria Garcia', cargo: 'SEO Expert', socialUser: 'ig/mariagarcia', socialIcon: 'fa-brands fa-instagram', foto: 'https://i.pravatar.cc/500?img=5' },
          { nome: 'Steve Jobs', cargo: 'Developer', socialUser: 'gh/steve', socialIcon: 'fa-brands fa-github', foto: 'https://i.pravatar.cc/500?img=8' },
          { nome: 'Sarah Connor', cargo: 'Project Manager', socialUser: 'ln/sarah', socialIcon: 'fa-brands fa-linkedin-in', foto: 'https://i.pravatar.cc/500?img=9' }
        ]
      },
      mounted() {
        this.$nextTick(() => {
          new Swiper('.swiper-container', {
            slidesPerView: 1,
            spaceBetween: 10,
            loop: true,               // Faz o slider ser infinito
            centeredSlides: true,      // O slide "Ativo" fica sempre no meio
            autoplay: {
              delay: 3000,
              disableOnInteraction: false,
            },
            pagination: {
              el: '.swiper-pagination',
              clickable: true,
            },
            navigation: {
              nextEl: '.swiper-button-next',
              prevEl: '.swiper-button-prev',
            },
            breakpoints: {
              640: { slidesPerView: 2 },
              1024: { slidesPerView: 3 }, // Mostra 3 para o central ser o foco claro
              1400: { slidesPerView: 4 }
            }
          });
        });
      }
    });
  </script>
</body>
</html>
