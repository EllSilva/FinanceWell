<main class="main_content container">

 

    <div class="  premium-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content">

                <div class="modal-header border-0 d-flex justify-content-between align-items-start">
                    <div>
                        <span class="text-primary text-uppercase font-monospace fw-bold"
                            style="font-size: 0.7rem; letter-spacing: 0.15em;">Solicitação Direta</span>
                        <h3 class="modal-title fw-bold font-serif text-white mt-1" style="font-size: 1.75rem;">
                            Preencha o formulário abaixo para se inscrever em nossos cursos</h3>
                    </div>
                    <button type="button" class="btn-close btn-close-white opacity-75" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form @submit.prevent="submeterFormulario">
 

                        <div class="border-top border-secondary-subtle opacity-25 mb-4"></div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-12">
                                <div class="mb-3.5 position-relative">
                                    <label class="form-label text-uppercase">Seu Nome</label>
                                    <input type="text" class="form-control" required
                                        placeholder="Ex: Dr. Alexandre Soares" v-model="nome">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3.5 mt-3">
                                    <label class="form-label text-uppercase">E-mail </label>
                                    <input type="email" class="form-control" required
                                        placeholder="Ex: diretoria@suaempresa.com"
                                        v-model="email">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-3.5 mt-3">
                                    <label class="form-label text-uppercase">Telefone</label>
                                    <input type="number" class="form-control" required placeholder="Ex: 942 000 000"
                                        v-model="telefone">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-3.5 mt-3">
                                    <label for="categoria" class="form-label text-uppercase">Selecione a Categoria:</label>
                                    <select id="categoria" class="form-control" required v-model="categoriaSelecionada"
                                        @change="cursoSelecionado = ''">
                                        <option value="">-- Escolha uma Categoria --</option>
                                        <option v-for="(cursos, categoria) in dados" :key="categoria"
                                            :value="categoria">
                                            {{ categoria }}
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mt-3 mb-4">
 
                                    <div class="form-group">
                                        <label for="curso" class="form-label text-uppercase">Selecione o Curso:</label>
                                        <select id="curso" class="form-control" required v-model="cursoSelecionado" :disabled="!categoriaSelecionada">
                                            <option value="">-- Escolha um Curso --</option>
                                            <option v-for="curso in cursosFiltrados" :key="curso" :value="curso">
                                                {{ curso }}
                                            </option>
                                        </select>
                                    </div> 
                                </div>
                            </div>
                            <button type="submit"  @click="enviarWhatsApp"
                                class="btn btn-gradient-submit w-100 d-flex align-items-center justify-content-center gap-2 text-uppercase text-white">
                                <span>Enviar Inscrição via WhatsApp</span>
                                <i class="bi bi-whatsapp small"></i>
                            </button>
                    </form>
                </div>

            </div>
        </div>
    </div>




 


</main>
