<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider de Equipe - Vue 2 & Swiper</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background-color: #f3f4f8;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
    }
    .team-section {
      padding: 60px 0;
    }
    .swiper-container {
      width: 100%;
      padding: 20px 0 50px 0;
      position: relative;
    }
    
    /* Customização dos Cards baseada na imagem */
    .team-card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
    }
    .image-container {
      position: relative;
      width: 100%;
      padding-top: 100%; /* Mantém a proporção quadrada 1:1 */
      background-color: #eaeaea;
    }
    .image-container img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter 0.3s ease;
    }
    /* Efeito de hover ativa a cor (como o terceiro card da imagem) */
    .team-card:hover .image-container img,
    .team-card.active-style .image-container img {
      filter: grayscale(0%);
    }

    /* Faixa de Rede Social */
    .social-bar {
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #eee;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .social-icon {
      background: #000;
      color: #fff;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .social-user {
      padding-left: 15px;
      font-size: 0.85rem;
      color: #777;
    }

    /* Detalhes do Membro */
    .member-info {
      padding: 20px;
      position: relative;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .member-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .member-role {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 15px;
    }
    .arrow-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: #0d6efd;
      font-size: 1.2rem;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    /* Estilo Destacado (Item Azul da Imagem) */
    .team-card:hover .social-bar,
    .team-card.active-style .social-bar {
      background: #0d6efd;
      border-color: #0d6efd;
    }
    .team-card:hover .social-user,
    .team-card.active-style .social-user {
      color: #fff;
    }
    .team-card:hover .member-info,
    .team-card.active-style .member-info {
      background: #0d6efd;
      color: #fff;
    }
    .team-card:hover .member-role,
    .team-card.active-style .member-role {
      color: #e0e0e0;
    }
    .team-card:hover .arrow-btn,
    .team-card.active-style .arrow-btn {
      color: #fff;
      transform: translateX(5px);
    }

    /* --- NOVOS ESTILOS: Botões de Navegação Animados --- */
    .nav-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .btn-swiper {
      width: 50px;
      height: 50px;
      background-color: #fff;
      border: 2px solid #0d6efd;
      color: #0d6efd;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 3px 6px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
      z-index: 10;
    }
    /* Ícones internos para animação */
    .btn-swiper i {
      transition: transform 0.3s ease;
    }
    /* Efeito de Hover Geral */
    .btn-swiper:hover {
      background-color: #0d6efd;
      color: #fff;
      transform: scale(1.08);
      box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
    }
    /* Animação específica da seta da esquerda (Voltar) */
    .btn-swiper-prev:hover i {
      transform: translateX(-4px);
    }
    /* Animação específica da seta da direita (Avançar) */
    .btn-swiper-next:hover i {
      transform: translateX(4px);
    }
    /* Estado desativado quando chega ao fim/início do slider */
    .btn-swiper.swiper-button-disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #ccc;
      color: #999;
      background-color: #fff;
      transform: none;
      box-shadow: none;
    }
    .btn-swiper.swiper-button-disabled i {
      transform: none !important;
    }
  </style>
</head>
<body>

  <div id="app" class="container team-section">
    <div class="row justify-content-center text-center mb-5">
      <div class="col-md-8">
        <h2 class="fw-bold display-4">Our Team</h2>
        <p class="text-muted">aliquot exec commode design. Lorem laboris aliquot exec Lorem ipsum sit dolor aliquot. laborer consecteur laborer et dolor magna dolor aliquot. laborer consectetur adipisicing alit, sed do dolor</p>
      </div>
    </div>

    <div class="position-relative">
      <div class="swiper swiper-container">
        <div class="swiper-wrapper">
          
          <div class="swiper-slide" v-for="(membro, index) in equipe" :key="index">
            <div class="team-card" :class="{ 'active-style': index === 2 }">
              
              <div class="image-container">
                <img :src="membro.foto" :alt="membro.nome">
              </div>
              
              <div class="social-bar">
                <div class="social-icon">
                  <i :class="membro.socialIcon"></i>
                </div>
                <div class="social-user">{{ membro.socialUser }}</div>
              </div>
              
              <div class="member-info">
                <div class="member-name">{{ membro.nome }}</div>
                <div class="member-role">{{ membro.cargo }}</div>
                <a href="#" class="arrow-btn">
                  <i class="fa-solid fa-arrow-right"></i>
                </a>
              </div>

            </div>
          </div>

        </div>
        
        <div class="swiper-pagination"></div>
      </div>

      <div class="nav-container">
        <div class="btn-swiper btn-swiper-prev">
          <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div class="btn-swiper btn-swiper-next">
          <i class="fa-solid fa-chevron-right"></i>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    new Vue({
      el: '#app',
      data: {
        equipe: [
          {
            nome: 'Joss Anderson',
            cargo: 'Art Director',
            foto: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=500',
            socialIcon: 'fa-brands fa-facebook-f',
            socialUser: 'Facebook/user'
          },
          {
            nome: 'Joss Anderson',
            cargo: 'Ux Designer',
            foto: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=500',
            socialIcon: 'fa-brands fa-twitter',
            socialUser: 'Twitter/user'
          },
          {
            nome: 'Joss Anderson',
            cargo: 'Web Designer',
            foto: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=500',
            socialIcon: 'fa-brands fa-linkedin-in',
            socialUser: 'LinkedIn/user'
          },
          {
            nome: 'Joss Anderson',
            cargo: 'SEO Expert',
            foto: 'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=500',
            socialIcon: 'fa-brands fa-instagram',
            socialUser: 'Instagram/user'
          },
          {
            nome: 'Joss Anderson',
            cargo: 'Developer',
            foto: 'https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?auto=format&fit=crop&q=80&w=500',
            socialIcon: 'fa-brands fa-github',
            socialUser: 'Github/user'
          }
        ]
      },
      mounted() {
        this.$nextTick(() => {
          new Swiper('.swiper-container', {
            slidesPerView: 1,
            spaceBetween: 20,
            pagination: {
              el: '.swiper-pagination',
              clickable: true,
            },
            // CONFIGURAÇÃO DOS NOVOS BOTÕES
            navigation: {
              nextEl: '.btn-swiper-next',
              prevEl: '.btn-swiper-prev',
            },
            breakpoints: {
              576: {
                slidesPerView: 2,
              },
              768: {
                slidesPerView: 3,
              },
              1200: {
                slidesPerView: 4,
              }
            }
          });
        });
      }
    });
  </script>
</body>
</html>
