<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Fullscreen Vue.js 2</title>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>

    <style>
        /* Reset para ocupar tela cheia */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }
        /* Slides */
        
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        
        .slide.active {
            opacity: 1;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Overlay de Texto */
        
        .info {
            position: absolute;
            bottom: 15%;
            left: 5%;
            color: white;
            z-index: 5;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }
        
        .info h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        
        .info p {
            font-size: 1.2rem;
        }
        /* Botões de Navegação */
        
        .btn {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 80px;
            background: rgba(0, 0, 0, 0.1);
            border: none;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 10;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: rgba(0, 0, 0, 0.4);
        }
        
        .prev {
            left: 0;
        }
        
        .next {
            right: 0;
        }
        /* Indicadores */
        
        .dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        
        .dot {
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        .dot.active {
            background: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <div id="app">
        <div class="slider-container">
            <div v-for="(slide, index) in slides" :key="index" class="slide" :class="{ active: currentIndex === index }">
                <img :src="slide.url" :alt="slide.title">
                <div class="info">
                    <h1>{{ slide.title }}</h1>
                    <p>{{ slide.desc }}</p>
                </div>
            </div>

            <button class="btn prev" @click="prevSlide">&#10094;</button>
            <button class="btn next" @click="nextSlide">&#10095;</button>

            <div class="dots">
                <span v-for="(_, index) in slides" :key="'dot-' + index" class="dot" :class="{ active: currentIndex === index }" @click="currentIndex = index"></span>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                currentIndex: 0,
                timer: null,
                slides: [{
                    url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=1920',
                    title: 'Natureza Viva',
                    desc: 'Cenários deslumbrantes ao redor do mundo.'
                }, {
                    url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1920',
                    title: 'Exploração',
                    desc: 'Descubra novos horizontes.'
                }, {
                    url: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=1920',
                    title: 'Tranquilidade',
                    desc: 'Momentos de paz em meio ao verde.'
                }]
            },
            methods: {
                nextSlide() {
                    this.currentIndex = (this.currentIndex + 1) % this.slides.length;
                },
                prevSlide() {
                    this.currentIndex = (this.currentIndex - 1 + this.slides.length) % this.slides.length;
                },
                startAutoPlay() {
                    this.timer = setInterval(this.nextSlide, 5000);
                },
                stopAutoPlay() {
                    clearInterval(this.timer);
                }
            },
            mounted() {
                this.startAutoPlay();
            },
            beforeDestroy() {
                // Limpa o timer para evitar vazamento de memória ao destruir o componente
                this.stopAutoPlay();
            }
        });
    </script>

</body>

</html>
