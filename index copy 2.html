<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap + Vue 2 Infinite Slider</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Vue.js 2 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .slider-window {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        
        .slider-track {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            will-change: transform;
        }
        /* Card customizado usando classes do Bootstrap como base */
        
        .slide-card {
            flex: 0 0 320px;
            height: 400px;
            margin: 0 15px;
            border: none;
            border-radius: 1rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            transform: scale(0.85);
            filter: grayscale(100%);
        }
        /* Destaque do card central */
        
        .slide-card.active {
            opacity: 1;
            transform: scale(1.1);
            filter: grayscale(0%);
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.175) !important;
        }
        
        .card-overlay {
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            border-radius: 1rem;
            color: white;
        }
        /* Botões flutuantes estilo Bootstrap */
        
        .btn-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .btn-prev {
            left: 20px;
        }
        
        .btn-next {
            right: 20px;
        }
    </style>
</head>

<body>

    <div id="app" class="container-fluid px-0">
        <div class="slider-window">

            <!-- Botões de Navegação (Bootstrap) -->
            <button class="btn btn-light btn-nav btn-prev shadow" @click="prev">
            <span class="fs-4">❮</span>
        </button>
            <button class="btn btn-light btn-nav btn-next shadow" @click="next">
            <span class="fs-4">❯</span>
        </button>

            <!-- Trilho do Slider -->
            <div class="slider-track" :style="trackStyle" @transitionend="handleTransitionEnd">
                <div v-for="(slide, index) in displaySlides" :key="index" class="slide-card shadow-sm" :class="{ 'active': currentIdx === index }" :style="{ backgroundImage: 'url(' + slide.img + ')' }">
                    <div class="card-overlay">
                        <h4 class="fw-bold mb-1">{{ slide.title }}</h4>
                        <p class="small mb-0 opacity-75">{{ slide.desc }}</p>
                        <button class="btn btn-primary btn-sm mt-3 w-50" v-if="currentIdx === index">Ver mais</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                currentIdx: 3,
                transitioning: true,
                cardWidth: 350, // largura (320) + margens (15+15)
                rawSlides: [{
                    title: 'Tech Solutions',
                    desc: 'Inovação em software',
                    img: 'https://picsum.photos/id/1/400/600'
                }, {
                    title: 'Design Thinking',
                    desc: 'Criatividade focada',
                    img: 'https://picsum.photos/id/2/400/600'
                }, {
                    title: 'Cloud Data',
                    desc: 'Segurança absoluta',
                    img: 'https://picsum.photos/id/3/400/600'
                }, {
                    title: 'AI Future',
                    desc: 'O amanhã agora',
                    img: 'https://picsum.photos/id/4/400/600'
                }],
                displaySlides: []
            },
            computed: {
                trackStyle() {
                    // Centralização precisa usando a largura da janela
                    const centerOffset = window.innerWidth / 2 - this.cardWidth / 2;
                    const x = centerOffset - (this.currentIdx * this.cardWidth);
                    return {
                        transform: 'translateX(' + x + 'px)',
                        transition: this.transitioning ? 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)' : 'none'
                    };
                }
            },
            created() {
                // Lógica de Clones para Loop Infinito
                const startClones = this.rawSlides.slice(-3);
                const endClones = this.rawSlides.slice(0, 3);
                this.displaySlides = [...startClones, ...this.rawSlides, ...endClones];
            },
            methods: {
                next() {
                    if (!this.transitioning) return;
                    this.currentIdx++;
                },
                prev() {
                    if (!this.transitioning) return;
                    this.currentIdx--;
                },
                handleTransitionEnd() {
                    // Teleporte invisível (Loop)
                    if (this.currentIdx >= this.displaySlides.length - 3) {
                        this.transitioning = false;
                        this.currentIdx = 3;
                        this.$nextTick(() => {
                            setTimeout(() => {
                                this.transitioning = true;
                            }, 50);
                        });
                    } else if (this.currentIdx <= 2) {
                        this.transitioning = false;
                        this.currentIdx = this.displaySlides.length - 6;
                        this.$nextTick(() => {
                            setTimeout(() => {
                                this.transitioning = true;
                            }, 50);
                        });
                    }
                }
            }
        });
    </script>

</body>

</html>
