<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maube Consultoria - CTA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Estilização da Secção de Fundo */
        .cta-section {
            position: relative;
            /* Substitui pelo caminho real da tua imagem de fundo se preferires */
            background: url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070') no-repeat center center;
            background-size: cover;
            padding: 80px 0;
            color: #ffffff;
            z-index: 1;
        }

        /* Overlay escuro para dar o mesmo tom da imagem original */
        .cta-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(30, 41, 59, 0.85); /* Tom azul-escuro/cinza com opacidade */
            z-index: -1;
        }

        /* Linha pontilhada decorativa no topo */
        .cta-section::after {
            content: "";
            position: absolute;
            top: 20px;
            left: 5%;
            width: 90%;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            z-index: 0;
        }

        /* Botão Azul Personalizado */
        .btn-custom-blue {
            background-color: #0099c4;
            color: #ffffff;
            border-radius: 50px;
            padding: 14px 35px;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .btn-custom-blue:hover {
            background-color: #007fa5;
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Ícone de Telefone Circular */
        .phone-icon-circle {
            width: 60px;
            height: 60px;
            border: 2px dashed rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        /* Links de contacto */
        .contact-info p {
            margin-bottom: 0;
            font-size: 1.1rem;
        }

        .contact-links a {
            color: #ffffff;
            text-decoration: underline;
            text-underline-offset: 4px;
            font-size: 1.1rem;
            transition: opacity 0.2s;
        }

        .contact-links a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <section class="cta-section d-flex align-items-center">
        <div class="container">
            <div class="row align-items-center justify-content-center gy-4">
                
                <div class="col-12 col-md-auto text-center">
                    <a href="#" class="btn btn-custom-blue">
                        Lista de Formações <i class="bi bi-arrow-right"></i>
                    </a>
                </div>

                <div class="col-12 col-md-auto d-flex flex-column flex-sm-row align-items-center justify-content-center gap-3 text-center text-sm-start">
                    <div class="phone-icon-circle">
                        <i class="bi bi-telephone-inbound"></i>
                    </div>
                    
                    <div class="contact-info">
                        <p class="fw-light">Quero fazer parte da formação</p>
                        <div class="contact-links fw-light">
                            <a href="mailto:geral@maubeconsultoria.com">geral@maubeconsultoria.com</a> 
                            <span class="mx-1">&</span> 
                            <a href="tel:+244948329810">+244 948 329 810</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
