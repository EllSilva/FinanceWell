<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Serviços - Slider Premium</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #0b0f19; /* Fundo escuro para destacar as imagens */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .services-section {
            padding: 100px 0;
        }

        .section-title {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .swiper-container-wrapper {
            position: relative;
            padding: 30px 40px;
        }

        /* --- CARD COM IMAGEM PREMIUM --- */
        .service-card {
            position: relative;
            height: 420px;
            border-radius: 20px;
            overflow: hidden; /* Mantém o zoom da imagem dentro do card */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 35px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Imagem de Fundo */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s ease;
            z-index: 1;
        }

        /* Overlay Gradiente (Escurece a imagem para o texto ficar legível) */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(11, 15, 25, 0.95) 20%, rgba(11, 15, 25, 0.6) 60%, rgba(0,0,0,0) 100%);
            z-index: 2;
            transition: background 0.4s ease;
        }

        /* Conteúdo do Card */
        .card-content {
            position: relative;
            z-index: 3;
        }

        /* Ícone Superior Flutuante */
        .icon-badge {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #6366f1; /* Cor moderna em tom de roxo/azul */
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }

        .card-content h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .card-content p {
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-action {
            color: #818cf8;
            font-weight: 600;
            text-decoration: none !important;
            display: inline-flex;
            align-items: center;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action i {
            margin-left: 8px;
            transition: transform 0.3s;
        }

        /* --- EFEITOS HOVER --- */
        .service-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .service-card:hover .card-bg {
            transform: scale(1.1); /* Efeito de Zoom na imagem */
        }

        .service-card:hover .card-overlay {
            background: linear-gradient(to top, rgba(99, 102, 241, 0.85) 10%, rgba(11, 15, 25, 0.7) 70%);
        }

        .service-card:hover .icon-badge {
            background: #ffffff;
            color: #6366f1;
            transform: scale(1.05);
        }

        .service-card:hover .card-content h3, 
        .service-card:hover .card-content p,
        .service-card:hover .btn-action {
            color: #ffffff;
        }

        .service-card:hover .btn-action i {
            transform: translateX(6px);
        }

        /* Setas do Swiper Customizadas */
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .swiper-button-next:hover, .swiper-button-prev:hover {
            background: #6366f1;
            border-color: #6366f1;
        }

        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 16px;
        }

        /* Pontos de Paginação */
        .swiper-pagination-bullet {
            background: rgba(255, 255, 255, 0.3);
        }
        .swiper-pagination-bullet-active {
            background: #6366f1;
            width: 25px;
            border-radius: 10px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

<div id="app" class="container services-section">
    <div class="row text-center mb-4">
        <div class="col-12">
            <h2 class="section-title">Nossos Serviços</h2>
            <p class="text-muted lead">Descubra como transformamos ideias em negócios de alto impacto.</p>
        </div>
    </div>

    <div class="swiper-container-wrapper">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide" v-for="(servico, index) in servicos" :key="index">
                    <div class="service-card">
                        <div class="card-bg" :style="{ backgroundImage: 'url(' + servico.imagem + ')' }"></div>
                        <div class="card-overlay"></div>
                        
                        <div class="card-content">
                            <div class="icon-badge">
                                <i :class="servico.icone"></i>
                            </div>
                            <h3>{{ servico.titulo }}</h3>
                            <p>{{ servico.descricao }}</p>
                            <a href="#" class="btn-action">Conhecer Serviço <i class="fas fa-chevron-right"></i></a>
                        </div>
                    </div>
                </div>

            </div>
            
            <div class="swiper-pagination mt-5" style="position: relative;"></div>
        </div>

        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>

<script>
    new Vue({
        el: '#app',
        data: {
            servicos: [
                { 
                    titulo: 'Desenvolvimento Web', 
                    descricao: 'Aplicações robustas, e-commerces e sites ultra velozes sob medida.', 
                    icone: 'fas fa-layer-group',
                    imagem: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&auto=format&fit=crop&q=80'
                },
                { 
                    titulo: 'UI/UX Design', 
                    descricao: 'Interfaces de alto padrão focadas na experiência do seu usuário.', 
                    icone: 'fas fa-bezier-curve',
                    imagem: 'https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=600&auto=format&fit=crop&q=80'
                },
                { 
                    titulo: 'Marketing Digital', 
                    descricao: 'Estratégias de tráfego e posicionamento para dominar o mercado.', 
                    icone: 'fas fa-bullseye',
                    imagem: 'https://images.unsplash.com/photo-1432888622747-4eb9a8efeb07?w=600&auto=format&fit=crop&q=80'
                },
                { 
                    titulo: 'Business Intelligence', 
                    descricao: 'Análise detalhada de dados para guiar suas tomadas de decisão.', 
                    icone: 'fas fa-chart-pie',
                    imagem: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&auto=format&fit=crop&q=80'
                },
                { 
                    titulo: 'Cloud & Segurança', 
                    descricao: 'Infraestrutura em nuvem segura, escalável e de alta disponibilidade.', 
                    icone: 'fas fa-shield-alt',
                    imagem: 'https://images.unsplash.com/photo-1600132806370-bf17e65e942f?w=600&auto=format&fit=crop&q=80'
                }
            ]
        },
        mounted() {
            this.$nextTick(() => {
                new Swiper(".mySwiper", {
                    slidesPerView: 1,
                    spaceBetween: 30,
                    loop: true,
                    autoplay: {
                        delay: 5000,
                        disableOnInteraction: false,
                    },
                    pagination: {
                        el: ".swiper-pagination",
                        clickable: true,
                    },
                    navigation: {
                        nextEl: ".swiper-button-next",
                        prevEl: ".swiper-button-prev",
                    },
                    breakpoints: {
                        768: { slidesPerView: 2 },
                        1024: { slidesPerView: 3 }
                    }
                });
            });
        }
    });
</script>

</body>
</html>
